<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Commerce Store Application">
    <meta name="author" content="Amr Khaled">
    <title>Checkout</title>
    <meta property="og:title" content="E-Commerce Store Application">
    <meta property="og:description" content="Browse and shop products in our E-Commerce Store.">
    <meta property="og:type" content="website">
    <!-- Font Awesome Library -->
    <link rel="stylesheet" href="css/all.min.css">
    <!-- Render All Elements Normally -->
    <link rel="stylesheet" href="css/normalize.css">
    <!-- Main CSS File -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="container">
            <h2>My Orders</h2>
            <dialog class="details-dialog" id="detailsDialog">
                <div class="dialog-header">
                    <h3>Order Details</h3>
                    <button id="closeDialogBtn" class="dialog-close" type="button">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="dialog-content" id="dialogContent">
                    <div class="customer-info" id="customerInfo">
                        <!-- Customer info will be added here dynamically -->
                    </div>
                    <div class="items-details" id="itemsDetails">
                        <!-- Order details will be added here dynamically -->
                    </div>
                    <div class="order-summary" id="orderSummary">
                        <!-- Order summary will be added here dynamically -->
                    </div>
                </div>
            </dialog>
            <div class="orders-container" id="ordersContainer">
                <!-- Orders will be added here dynamically -->
            </div>
            <button id="returnToHome">Return to Home</button>
            <div class="status" id="status">
                <!-- Status will be added here dynamically -->
            </div>
        </div>
    </main>
    <script type="module" src="src/pages/orders.js"></script>
</body>

</html>
