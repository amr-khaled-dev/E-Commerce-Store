<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Commerce Store Application">
    <meta name="author" content="Amr Khaled">
    <title>Shop</title>
    <meta property="og:title" content="E-Commerce Store Application">
    <meta property="og:description" content="Browse and shop products in our E-Commerce Store.">
    <meta property="og:type" content="website">
    <!-- Font Awesome Library -->
    <link rel="stylesheet" href="css/all.min.css">
    <!-- Render All Elements Normally -->
    <link rel="stylesheet" href="css/normalize.css">
    <!-- Main CSS File -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="container">
            <div class="products-section" id="productsSection">
                <h2>Shop</h2>
                <h4>Browse our full collection of products</h4>
                <div class="search" role="search">
                    <input type="search" id="searchInput" placeholder="Search products..." aria-label="Search products">
                </div>
                <div class="categories-products-container">
                    <div class="categories-container" id="categoriesContainer">
                        <!-- Categories will be added here dynamically -->
                    </div>
                    <div class="products-grid" id="productsGrid">
                        <!-- Products will be added here dynamically -->
                    </div>
                </div>
                <div class="pagination-container" id="paginationContainer">
                    <button class="pagination-btn" id="prevPageBtn" title="Previous page"
                        aria-label="Previous page">&lt;</button>
                    <!-- Pagination numbers will be added here dynamically -->
                    <button class="pagination-btn" id="nextPageBtn" title="Next page"
                        aria-label="Next page">&gt;</button>
                </div>
            </div>
            <div class="status" id="status">
                <!-- Status will be added here dynamically -->
            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script type="module" src="src/pages/shop.js"></script>
</body>

</html>
